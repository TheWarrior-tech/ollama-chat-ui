use_default_settings: true

general:
  debug: false
  instance_name: NeuralChat Search

server:
  secret_key: "neuralchat-searxng-secret-32chars!!"
  bind_address: "0.0.0.0"
  port: 8080
  public_instance: false
  limiter: false
  image_proxy: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json

outgoing:
  request_timeout: 12.0
  max_request_timeout: 25.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
    disabled: false
    categories: [general, news]

  - name: bing
    engine: bing
    shortcut: b
    disabled: false
    categories: [general, news]

  - name: bing news
    engine: bing_news
    shortcut: bn
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false

  - name: duckduckgo news
    engine: duckduckgo_news
    shortcut: dn
    disabled: false

  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: w
    disabled: false

  - name: wolframalpha
    engine: wolframalpha webapp
    shortcut: wa
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    categories: [general, news]

  - name: google images
    engine: google_images
    shortcut: gi
    disabled: false

  - name: bing images
    engine: bing_images
    shortcut: bi
    disabled: false

ui:
  static_use_hash: true
  default_theme: simple
  center_alignment: true
  infinite_scroll: false
  default_locale: en
