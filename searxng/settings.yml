use_default_settings: true

general:
  debug: false
  instance_name: NeuralChat Search

server:
  secret_key: "neuralchat-searxng-secret-32chars!!"
  bind_address: "0.0.0.0"
  port: 8080
  public_instance: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
  - name: bing
    engine: bing
    shortcut: b
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
  - name: wikipedia
    engine: wikipedia
    shortcut: w

ui:
  static_use_hash: true
