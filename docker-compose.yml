services:
  ollama-chat:
    build: .
    container_name: ollama-chat
    ports:
      - '3000:3000'
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - SEARXNG_HOST=http://searxng:8080
      - DATABASE_URL=postgresql://neuralchat:neuralchat@postgres:5432/neuralchat
      - NEXTAUTH_SECRET=neuralchat-super-secret-key-change-in-prod
      - NEXTAUTH_URL=http://localhost:3000
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - neural-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: neuralchat-db
    environment:
      - POSTGRES_USER=neuralchat
      - POSTGRES_PASSWORD=neuralchat
      - POSTGRES_DB=neuralchat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralchat"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - neural-net
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - '8080:8080'
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    networks:
      - neural-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  neural-net:
    driver: bridge
