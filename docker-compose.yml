services:
  ollama-chat:
    build: .
    container_name: ollama-chat
    ports:
      - '3000:3000'
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - STABLE_DIFFUSION_HOST=http://stable-diffusion:7860
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  stable-diffusion:
    image: universumguy/automatic1111-stable-diffusion:latest
    container_name: stable-diffusion
    ports:
      - '7860:7860'
    volumes:
      - sd-models:/stable-diffusion-webui/models
    environment:
      - CLI_ARGS=--api --listen --no-half-vae
    restart: unless-stopped

volumes:
  sd-models:
